services:
  postgres:
    image: postgres:16
    container_name: lumenhr_postgres
    environment:
      POSTGRES_USER: lumenhr
      POSTGRES_PASSWORD: lumenhr_local
      POSTGRES_DB: lumenhr
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: